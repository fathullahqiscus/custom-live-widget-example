<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qiscus Widget - Custom Channel Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <!-- Toggle Button -->
    <button id="ccm-toggle" aria-label="Open chat menu">
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"
        />
      </svg>
    </button>

    <!-- Panel Menu -->
    <div id="ccm-panel" role="dialog" aria-label="Pusat Bantuan">
      <div class="ccm-header">
        <div class="ccm-eyebrow">Halo</div>
        <h2>Ada yang bisa kami bantu?</h2>
        <button class="ccm-close" id="ccm-close" aria-label="Close">
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
          >
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Menu items di-render oleh JS dari config -->
      <div class="ccm-list" id="ccm-list"></div>

      <div class="ccm-footer">
        <div class="ccm-disclaimer">Jam operasional 09.00-17.00 WIB.</div>
        <div class="ccm-powered">Powered by Qiscus</div>
      </div>
    </div>

    <!-- Scripts: cases dulu (data case/kategori), lalu config, lalu app logic -->
    <script src="../js/cases.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
