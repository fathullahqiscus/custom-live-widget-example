<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Widget Customization Showcase — Qiscus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header class="dash-hero">
      <div class="dash-hero-inner">
        <div class="dash-eyebrow">Qiscus Omnichannel</div>
        <h1>Widget Customization Showcase</h1>
        <p>
          Pilih salah satu case di samping untuk melihat live chat
          widget Qiscus yang sesungguhnya (bukan mockup) — lengkap
          dengan kustomisasinya masing-masing.
        </p>
        <a
          class="dash-download-btn"
          href="https://github.com/fathullahqiscus/custom-live-widget-example/archive/refs/heads/main.zip"
          download
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <path d="M7 10l5 5 5-5" />
            <path d="M12 15V3" />
          </svg>
          Download source code (.zip)
        </a>
      </div>
    </header>

    <main class="dash-layout">
      <!-- Case picker: dirender oleh dashboard.js dari js/cases.js -->
      <nav class="dash-picker" id="dash-picker" aria-label="Daftar case kustomisasi"></nav>

      <section class="dash-detail">
        <div class="dash-description" id="dash-description">
          <!-- Judul case + bullet kustomisasi, dirender oleh dashboard.js -->
        </div>

        <div class="dash-preview">
          <div class="dash-preview-overlay" id="dash-preview-overlay">
            <div class="dash-spinner"></div>
          </div>
          <iframe
            id="dash-preview-iframe"
            class="dash-preview-iframe"
            title="Live preview widget Qiscus"
          ></iframe>
        </div>
      </section>
    </main>

    <script src="js/cases.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
